# config.yaml 示例  

# 模型名字，决定ATTRIBUTOR字典中用哪个模型  
model_name: resnet50  

# 随机种子  
manualSeed: 42  

# 是否使用 cudnn benchmark  
cudnn: true  

# 训练日志保存路径  
# log_dir: ./logs  

# 优化器配置  
optimizer:  
  type: adam           # 支持 adam 或 sgd  
  adam:  
    lr: 0.001  
  sgd:  
    lr: 0.01  

# 学习率调度器  
lr_scheduler: step    # 可选 step / cosine / null  
lr_step: 30          # step调度的step_size  
lr_gamma: 0.1        # step调度的gamma  
lr_T_max: 50         # cosine调度 T_max  
lr_eta_min: 0        # cosine调度 eta_min  

# 任务相关  
task_target: ""  

# 训练迭代次数  
start_epoch: 1  
nEpochs: 30  

# 评价指标，支持 ['auc', 'acc', 'ap']  
metric_scoring: acc  

# 是否保存checkpoint和特征（由命令行参数控制，默认true）  
save_ckpt: true  
save_feat: true  


# # 恢复训练
# resume_checkpoint: "/home/ImageAttributionBench/training/logs_try/default_split/resnet50/_2025-04-26-13-23-05/ckpt_epoch_25.pth"